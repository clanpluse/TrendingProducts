name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.2"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/TrendingProducts.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrendingProducts-APK
          path: app/build/outputs/apk/debug/TrendingProducts.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "🔥 ترند المنتجات v1.0.${{ github.run_number }}"
          body: |
            ## تطبيق ترند المنتجات العالمية

            ### ما يعرضه التطبيق:
            - 🛒 أكثر المنتجات مبيعاً من أمازون (بيانات حقيقية)
            - 🏭 منتجات المصانع الصينية من AliExpress
            - 🆕 أحدث المنتجات الرائجة

            ### كيفية التثبيت:
            1. حمّل ملف `TrendingProducts.apk`
            2. على هاتفك: الإعدادات → الأمان → السماح بالمصادر غير المعروفة
            3. افتح الملف وثبّته
          files: app/build/outputs/apk/debug/TrendingProducts.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
