name: Update Trending Products Data

on:
  schedule:
    # أسبوعياً (الإثنين 6ص UTC) — التحقق من التقييمات يستهلك طلبات أكثر
    # 6 بحث + 8 تقييمات = 14 طلب × 4 أسابيع = 56 طلب/شهر (الحد 100)
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch trending products
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/fetch_trending.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json data/history.json
          git diff --staged --quiet || git commit -m "chore: update trending products data [$(date -u '+%Y-%m-%d %H:%M')]"
          git push
